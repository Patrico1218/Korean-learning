<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韓文拼讀練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card: #221f35;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(255,107,107,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(107,203,119,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255,217,61,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .flag { font-size: 48px; margin-bottom: 8px; }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    font-weight: 300;
  }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--surface);
    padding: 6px;
    border-radius: 14px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), #ff8e53);
    color: white;
    font-weight: 600;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 12px;
    padding-left: 4px;
  }

  .char-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .char-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .char-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .char-card:hover::before { opacity: 0.08; }
  .char-card:hover { border-color: rgba(255,107,107,0.4); transform: translateY(-1px); }

  .char-card.flipped::before { opacity: 0.12; }
  .char-card.flipped { border-color: var(--accent); }

  .korean-char {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    display: block;
    position: relative;
    z-index: 1;
    line-height: 1.2;
  }

  .char-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    position: relative;
    z-index: 1;
    transition: all 0.2s;
  }

  .char-card .reveal {
    font-size: 12px;
    color: var(--accent2);
    font-weight: 600;
    margin-top: 2px;
    position: relative;
    z-index: 1;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .char-card.flipped .reveal {
    max-height: 40px;
  }

  .quiz-mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }

  .qmode-btn {
    flex: 1;
    padding: 9px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .qmode-btn.active {
    background: rgba(255,217,61,0.15);
    border-color: var(--accent2);
    color: var(--accent2);
    font-weight: 600;
  }

  .vocab-question {
    margin-bottom: 6px;
  }

  .vocab-korean {
    font-family: 'Noto Serif KR', serif;
    font-size: 36px;
    line-height: 1.3;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
    margin-bottom: 4px;
  }

  .vocab-romanize {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }

  .vocab-cat-badge {
    display: inline-block;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .cat-greet { background: rgba(107,203,119,0.2); color: var(--accent3); }
  .cat-food  { background: rgba(255,107,107,0.2); color: var(--accent); }
  .cat-shop  { background: rgba(255,217,61,0.2);  color: var(--accent2); }
  .cat-transport { background: rgba(100,180,255,0.2); color: #7ec8e3; }
  .cat-hotel { background: rgba(200,150,255,0.2); color: #ce93d8; }
  .cat-emergency { background: rgba(255,150,100,0.2); color: #ffab76; }
  .cat-body { background: rgba(160,130,255,0.2); color: #b39ddb; }

  .quiz-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
  }

  .quiz-question {
    font-family: 'Noto Serif KR', serif;
    font-size: 72px;
    margin-bottom: 8px;
    line-height: 1;
    background: linear-gradient(135deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .quiz-prompt {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .quiz-btn {
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .quiz-btn:hover:not(:disabled) {
    border-color: rgba(255,107,107,0.5);
    background: rgba(255,107,107,0.08);
  }

  .quiz-btn.correct {
    background: rgba(107,203,119,0.2);
    border-color: var(--accent3);
    color: var(--accent3);
    font-weight: 600;
  }

  .quiz-btn.wrong {
    background: rgba(255,107,107,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .quiz-btn:disabled { cursor: default; }

  .score-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .score-label {
    font-size: 12px;
    color: var(--muted);
  }

  .score-num {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent2);
  }

  .progress {
    height: 4px;
    background: var(--surface);
    border-radius: 4px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .feedback {
    font-size: 14px;
    margin-bottom: 16px;
    min-height: 20px;
    font-weight: 600;
  }

  .feedback.good { color: var(--accent3); }
  .feedback.bad { color: var(--accent); }

  .next-btn {
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--accent), #ff8e53);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .next-btn.show { display: inline-block; }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,107,107,0.4); }

  .flashcard-wrap {
    perspective: 1000px;
    margin-bottom: 20px;
  }

  .flashcard {
    width: 100%;
    height: 200px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
    cursor: pointer;
  }

  .flashcard.flipped { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .card-front {
    background: linear-gradient(135deg, var(--card), var(--surface));
    border: 1px solid var(--border);
  }

  .card-back {
    background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(255,217,61,0.1));
    border: 1px solid rgba(255,107,107,0.3);
    transform: rotateY(180deg);
  }

  .card-front .big-char {
    font-family: 'Noto Serif KR', serif;
    font-size: 80px;
    line-height: 1;
  }

  .card-front .tap-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
  }

  .card-back .reading {
    font-size: 36px;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 8px;
  }

  .card-back .meaning {
    font-size: 14px;
    color: var(--muted);
  }

  .card-back .example {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    margin-top: 8px;
    color: var(--text);
  }

  .fc-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .fc-btn {
    padding: 10px 24px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .fc-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .fc-deck-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .fc-deck-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .fc-deck-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,217,61,0.1);
    font-weight: 600;
  }

  .card-back .noun-korean {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-back .noun-romanize {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 8px;
  }

  .card-back .noun-cat {
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .result-screen {
    text-align: center;
    padding: 20px;
  }

  .result-emoji { font-size: 60px; margin-bottom: 16px; }
  .result-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .result-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  .retry-btn {
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--accent3), #4ecdc4);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .type-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 4px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .badge-vowel { background: rgba(107,203,119,0.2); color: var(--accent3); }
  .badge-plain { background: rgba(255,217,61,0.2); color: var(--accent2); }
  .badge-asp { background: rgba(255,107,107,0.2); color: var(--accent); }
  .badge-hard { background: rgba(160,130,255,0.2); color: #b39ddb; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="flag">🇰🇷</div>
    <h1>韓文拼讀練習</h1>
    <p class="subtitle">點擊翻牌看發音 • 測驗模式挑戰自己</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')">📖 認識字母</button>
    <button class="tab" onclick="switchTab('flash')">🃏 翻牌記憶</button>
    <button class="tab" onclick="switchTab('quiz')">🎯 測驗挑戰</button>
  </div>

  <div class="panel active" id="panel-browse">
    <div class="section-title">母音 Vowels</div>
    <div class="char-grid" id="vowel-grid"></div>

    <div class="section-title">子音 — 平音 Plain</div>
    <div class="char-grid" id="plain-grid"></div>

    <div class="section-title">子音 — 激音 Aspirated（送氣）</div>
    <div class="char-grid" id="asp-grid"></div>

    <div class="section-title">子音 — 硬音 Tense（緊音）</div>
    <div class="char-grid" id="hard-grid"></div>
  </div>

  <div class="panel" id="panel-flash">
    <div class="fc-deck-tabs">
      <button class="fc-deck-btn active" onclick="setFcDeck('alpha', this)">🔤 全部字母</button>
      <button class="fc-deck-btn" onclick="setFcDeck('vowel', this)">母音</button>
      <button class="fc-deck-btn" onclick="setFcDeck('consonant', this)">子音</button>
      <button class="fc-deck-btn" onclick="setFcDeck('food', this)">🍜 飲食</button>
      <button class="fc-deck-btn" onclick="setFcDeck('place', this)">📍 場所</button>
      <button class="fc-deck-btn" onclick="setFcDeck('transport', this)">🚇 交通</button>
      <button class="fc-deck-btn" onclick="setFcDeck('shopping', this)">🛍️ 購物</button>
      <button class="fc-deck-btn" onclick="setFcDeck('body', this)">🧍 身體</button>
      <button class="fc-deck-btn" onclick="setFcDeck('time', this)">🕐 時間</button>
    </div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-front">
          <span class="big-char" id="fc-char">ㅏ</span>
          <span class="tap-hint" id="fc-front-hint">點擊翻牌看答案</span>
        </div>
        <div class="card-back" id="fc-back">
          <span class="reading" id="fc-reading">ㄚ（a）</span>
          <span class="meaning" id="fc-meaning">母音</span>
          <span class="example" id="fc-example">아 (啊)</span>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn" onclick="fcPrev()">← 上一個</button>
      <button class="fc-btn" onclick="fcShuffle()">🔀 隨機</button>
      <button class="fc-btn" onclick="fcNext()">下一個 →</button>
    </div>
    <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:16px;" id="fc-counter"></p>
  </div>

  <div class="panel" id="panel-quiz">
    <div class="quiz-mode-tabs">
      <button class="qmode-btn active" id="qmode-alpha" onclick="setQuizMode('alpha')">🔤 字母發音</button>
      <button class="qmode-btn" id="qmode-vocab" onclick="setQuizMode('vocab')">✈️ 旅遊單字</button>
    </div>
    <div id="quiz-main">
      <div class="score-bar">
        <span class="score-label">答對</span>
        <span class="score-num" id="score-display">0 / 0</span>
      </div>
      <div class="progress"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="quiz-box">
        <div id="alpha-question">
          <div class="quiz-question" id="quiz-char">ㅏ</div>
          <div class="quiz-prompt">這個字母的發音是？</div>
        </div>
        <div id="vocab-question" style="display:none">
          <div class="vocab-question">
            <span class="vocab-korean" id="vocab-korean">안녕하세요</span>
            <span class="vocab-romanize" id="vocab-romanize">an-nyeong-ha-se-yo</span>
          </div>
          <div>
            <span class="vocab-cat-badge cat-greet" id="vocab-cat-badge">問候</span>
          </div>
          <div class="quiz-prompt">這句話的意思是？</div>
        </div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="feedback" id="quiz-feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
      </div>
    </div>
    <div id="quiz-result" style="display:none">
      <div class="quiz-box result-screen">
        <div class="result-emoji" id="result-emoji">🎉</div>
        <div class="result-title" id="result-title">太棒了！</div>
        <div class="result-sub" id="result-sub"></div>
        <button class="retry-btn" onclick="startQuiz()">再試一次</button>
      </div>
    </div>
  </div>
</div>

<script>
const data = {
  vowels: [
    { char:'ㅏ', reading:'ㄚ (a)', hint:'嘴開大', example:'아 (啊)', type:'vowel' },
    { char:'ㅓ', reading:'ㄜ (eo)', hint:'嘴開中', example:'어 (嗯)', type:'vowel' },
    { char:'ㅗ', reading:'ㄛ (o)', hint:'嘴圓', example:'오 (五)', type:'vowel' },
    { char:'ㅜ', reading:'ㄨ (u)', hint:'嘴突出', example:'우 (牛)', type:'vowel' },
    { char:'ㅡ', reading:'ㄜ扁 (eu)', hint:'嘴扁平', example:'으 (嗯)', type:'vowel' },
    { char:'ㅣ', reading:'ㄧ (i)', hint:'嘴角拉', example:'이 (這)', type:'vowel' },
    { char:'ㅐ', reading:'ㄝ (ae)', hint:'≈ㅔ同音', example:'개 (狗)', type:'vowel' },
    { char:'ㅔ', reading:'ㄝ (e)', hint:'≈ㅐ同音', example:'네 (是)', type:'vowel' },
    { char:'ㅑ', reading:'ㄧㄚ (ya)', hint:'ㅏ+一撇', example:'야 (喂)', type:'vowel' },
    { char:'ㅕ', reading:'ㄧㄜ (yeo)', hint:'ㅓ+一撇', example:'여 (女)', type:'vowel' },
    { char:'ㅛ', reading:'ㄧㄛ (yo)', hint:'ㅗ+一撇', example:'요 (要)', type:'vowel' },
    { char:'ㅠ', reading:'ㄧㄨ (yu)', hint:'ㅜ+一撇', example:'유 (有)', type:'vowel' },
  ],
  plain: [
    { char:'ㄱ', reading:'ㄍ/k (g)', hint:'像英文G', example:'가다 (去)', type:'plain' },
    { char:'ㄴ', reading:'ㄋ (n)', hint:'=注音ㄴ', example:'나 (我)', type:'plain' },
    { char:'ㄷ', reading:'ㄉ/t (d)', hint:'ㄴ+一橫', example:'다 (都)', type:'plain' },
    { char:'ㄹ', reading:'ㄌ~ㄖ (r/l)', hint:'輕彈舌', example:'라면 (泡麵)', type:'plain' },
    { char:'ㅁ', reading:'ㄇ (m)', hint:'像嘴巴', example:'먹다 (吃)', type:'plain' },
    { char:'ㅂ', reading:'ㄅ/p (b)', hint:'像嘴唇', example:'밥 (飯)', type:'plain' },
    { char:'ㅅ', reading:'ㄙ (s)', hint:'像牙齒', example:'사랑 (愛)', type:'plain' },
    { char:'ㅇ', reading:'無音/ㄥng', hint:'圓圈', example:'아이 (孩子)', type:'plain' },
    { char:'ㅈ', reading:'ㄐ (j)', hint:'', example:'저 (我-敬)', type:'plain' },
    { char:'ㅎ', reading:'ㄏ (h)', hint:'', example:'한국 (韓國)', type:'plain' },
  ],
  asp: [
    { char:'ㅋ', reading:'ㄎ (k)', hint:'ㄱ送氣版', example:'커피 (咖啡)', type:'asp' },
    { char:'ㅌ', reading:'ㄊ (t)', hint:'ㄷ送氣版', example:'타다 (搭乘)', type:'asp' },

    card.innerHTML = `

let fcIndex = 0;
let fcList = [...allChars];
let fcDeckType = 'alpha';

function setFcDeck(deckKey, button) {
  fcDeckType = deckKey;
  document.querySelectorAll('.fc-deck-btn').forEach(b => b.classList.remove('active'));
  button.classList.add('active');

  if (deckKey === 'alpha') {
    fcList = [...allChars];
  } else if (deckKey === 'vowel') {
    fcList = [...data.vowels];
  } else if (deckKey === 'consonant') {
    fcList = [...data.plain, ...data.asp, ...data.hard];
  } else {
    fcList = [...(nounDecks[deckKey] || [])];
  }
  fcIndex = 0;
  updateFlashcard();
}

function updateFlashcard() {
  const card = document.getElementById('flashcard');
  card.classList.remove('flipped');
  setTimeout(() => {
    const item = fcList[fcIndex];
    const isNoun = !!item.romanize;

    document.getElementById('fc-char').textContent = item.front || item.char;
    document.getElementById('fc-front-hint').textContent = isNoun ? '點擊看中文意思' : '點擊翻牌看發音';
    document.getElementById('fc-counter').textContent = `${fcIndex + 1} / ${fcList.length}`;

    const back = document.getElementById('fc-back');
    if (isNoun) {
      back.innerHTML = `
        <span class="noun-korean">${item.front}</span>
        <span class="noun-romanize">${item.romanize}</span>
        <span class="reading" style="font-size:28px;margin:6px 0">${item.meaning}</span>
        <span class="vocab-cat-badge ${catColorMap[item.cat] || 'cat-greet'}">${item.cat}</span>
      `;
    } else {
      back.innerHTML = `
        <span class="reading">${item.reading}</span>
        <span class="meaning">${labelMap[item.type]}</span>
        <span class="example">${item.example}</span>
      `;
    }
  }, 150);
}

function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }
function fcNext() { fcIndex = (fcIndex + 1) % fcList.length; updateFlashcard(); }
function fcPrev() { fcIndex = (fcIndex - 1 + fcList.length) % fcList.length; updateFlashcard(); }
function fcShuffle() {
  fcList = [...fcList].sort(() => Math.random() - 0.5);
  fcIndex = 0;
  updateFlashcard();
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function setQuizMode(mode) {
  quizMode = mode;
  document.getElementById('qmode-alpha').classList.toggle('active', mode === 'alpha');
  document.getElementById('qmode-vocab').classList.toggle('active', mode === 'vocab');
  startQuiz();
}

function startQuiz() {
  quizScore = 0;
  quizTotal = 0;
  quizQueue = quizMode === 'alpha' ? shuffle(allChars).slice(0, 15) : shuffle(travelVocab).slice(0, 15);
  document.getElementById('quiz-main').style.display = 'block';
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('alpha-question').style.display = quizMode === 'alpha' ? 'block' : 'none';
  document.getElementById('vocab-question').style.display = quizMode === 'vocab' ? 'block' : 'none';
  nextQuestion();
}

function nextQuestion() {
  if (quizQueue.length === 0) { showResult(); return; }
  answered = false;
  currentQ = quizQueue.shift();
  quizTotal++;

  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').className = 'feedback';
  document.getElementById('next-btn').classList.remove('show');

  if (quizMode === 'alpha') {
    document.getElementById('quiz-char').textContent = currentQ.char;
    const others = shuffle(allChars.filter(c => c.char !== currentQ.char)).slice(0, 3);
    const options = shuffle([currentQ, ...others]);
    const container = document.getElementById('quiz-options');
    container.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'quiz-btn';
      btn.textContent = opt.reading;
      btn.onclick = () => checkAlphaAnswer(btn, opt.char === currentQ.char);
      container.appendChild(btn);
    });
  } else {
    document.getElementById('vocab-korean').textContent = currentQ.korean;
    document.getElementById('vocab-romanize').textContent = currentQ.romanize;
    const badge = document.getElementById('vocab-cat-badge');
    badge.textContent = currentQ.catLabel;
    badge.className = `vocab-cat-badge cat-${currentQ.cat}`;

    const options = shuffle([currentQ.meaning, ...shuffle(currentQ.wrong).slice(0, 3)]);
    const container = document.getElementById('quiz-options');
    container.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'quiz-btn';
      btn.textContent = opt;
      btn.style.fontSize = '13px';
      btn.style.lineHeight = '1.4';
      btn.onclick = () => checkVocabAnswer(btn, opt === currentQ.meaning);
      container.appendChild(btn);
    });
  }

  updateScoreDisplay();
}

function checkAlphaAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.quiz-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === currentQ.reading) b.classList.add('correct');
  });
  const fb = document.getElementById('quiz-feedback');
  if (isCorrect) {
    quizScore++;
    btn.classList.add('correct');
    fb.textContent = ['✅ 答對了！','🎉 正確！','⭐ 棒棒！','👏 答對！'][Math.floor(Math.random()*4)];
    fb.className = 'feedback good';
  } else {
    btn.classList.add('wrong');
    fb.textContent = `❌ 正確答案是：${currentQ.reading}`;
    fb.className = 'feedback bad';
  }
  document.getElementById('next-btn').classList.add('show');
  updateScoreDisplay();
}

function checkVocabAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.quiz-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === currentQ.meaning) b.classList.add('correct');
  });
  const fb = document.getElementById('quiz-feedback');
  if (isCorrect) {
    quizScore++;
    btn.classList.add('correct');
    const tips = ['✅ 正確！旅遊加分！','🎉 答對了！','⭐ 記住了！出發前多練幾次','👏 很棒！'];
    fb.textContent = tips[Math.floor(Math.random()*tips.length)];
    fb.className = 'feedback good';
  } else {
    btn.classList.add('wrong');
    fb.textContent = `❌ 正確答案是：${currentQ.meaning}`;
    fb.className = 'feedback bad';
  }
  document.getElementById('next-btn').classList.add('show');
  updateScoreDisplay();
}

function updateScoreDisplay() {
  document.getElementById('score-display').textContent = `${quizScore} / ${quizTotal}`;
  const pct = quizTotal > 0 ? (quizTotal / 15) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showResult() {
  document.getElementById('quiz-main').style.display = 'none';
  document.getElementById('quiz-result').style.display = 'block';
  const pct = quizScore / 15;
  let emoji, title, sub;
  if (quizMode === 'vocab') {
    if (pct >= 0.9) { emoji='🛫'; title='準備出發！'; sub=`答對 ${quizScore}/15 題，韓國旅遊沒問題！`; }
    else if (pct >= 0.7) { emoji='🗺️'; title='旅遊基礎紮實！'; sub=`答對 ${quizScore}/15 題，再多練幾次更有把握！`; }
    else if (pct >= 0.5) { emoji='📖'; title='繼續加油！'; sub=`答對 ${quizScore}/15 題，建議先把常用句型背熟！`; }
    else { emoji='💪'; title='不要放棄！'; sub=`答對 ${quizScore}/15 題，多看幾遍再挑戰！`; }
  } else {
    if (pct >= 0.9) { emoji='🏆'; title='超級厲害！'; sub=`答對 ${quizScore}/15 題，諺文天才！`; }
    else if (pct >= 0.7) { emoji='🎉'; title='很不錯！'; sub=`答對 ${quizScore}/15 題，繼續練習會更好！`; }
    else if (pct >= 0.5) { emoji='💪'; title='加油！'; sub=`答對 ${quizScore}/15 題，多翻幾次牌就會記住！`; }
    else { emoji='📚'; title='繼續練習！'; sub=`答對 ${quizScore}/15 題，先去翻牌模式熟悉一下吧！`; }
  }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['browse','flash','quiz'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'quiz') startQuiz();
}
</script>
